<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQC Generator V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --border: #1a1a2e;
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --accent-glow: rgba(167,139,250,0.15);
      --text: #e2e2f0;
      --muted: #4a4a6a;
      --danger: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 5rem;
      overflow-x: hidden;
      opacity: 0;
      animation: pageIn 0.7s ease forwards;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(167,139,250,0.08), transparent),
        linear-gradient(rgba(167,139,250,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.02) 1px, transparent 1px);
      background-size: auto, 48px 48px, 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.12;
    }
    .glow-orb.one { width: 600px; height: 400px; background: var(--accent); top: -150px; left: -150px; }
    .glow-orb.two { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.5s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    h1 {
      font-size: clamp(1.8rem, 7vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.1s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .field { margin-bottom: 1.2rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .info-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.63rem;
      color: var(--accent2);
      margin-top: 0.4rem;
      opacity: 0.75;
    }

    .cooldown-wrap { display: none; margin-bottom: 1rem; }
    .cooldown-wrap.show { display: block; }
    .cooldown-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .cooldown-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 1s linear;
    }
    .cooldown-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      text-align: center;
    }

    .btn-generate {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(167,139,250,0.3);
    }
    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-generate .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn-generate.loading .btn-text { display: none; }
    .btn-generate.loading .spinner { display: block; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 1.5rem;
      display: none;
      animation: fadeUp 0.4s ease both;
    }
    .result-card.show { display: block; }

    .result-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .result-img-wrap {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-img-wrap img { width: 100%; height: auto; display: block; }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn-action {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform 0.15s;
    }
    .btn-action:hover { transform: translateY(-1px); }
    .btn-download { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-copy {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }

    .error-box {
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--danger);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      margin-top: 1rem;
      display: none;
    }
    .error-box.show { display: block; }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.75); }
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 1.5rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="glow-orb one"></div>
  <div class="glow-orb two"></div>

  <div class="container">
    <header>
      <div class="badge">IQC Generator · V3</div>
      <h1>Generate<br/><span>IQC Card</span></h1>
      <p class="subtitle">// powered by api-faa.my.id</p>
    </header>

    <div class="card">
      <div class="cooldown-wrap" id="cooldownWrap">
        <div class="cooldown-bar-bg">
          <div class="cooldown-bar" id="cooldownBar" style="width:100%"></div>
        </div>
        <div class="cooldown-text" id="cooldownText">Cooldown: 60 detik</div>
      </div>

      <div class="field">
        <label>Prompt / Pesan</label>
        <textarea id="prompt" rows="3" placeholder="Tulis sesuatu... misal: Haalo guys!"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label>Jam</label>
          <input type="text" id="jam" readonly />
          <span class="info-chip">⏱ auto-detect waktu lokal</span>
        </div>
        <div class="field">
          <label>Baterai (%)</label>
          <input type="number" id="batre" min="0" max="100" placeholder="67" />
        </div>
      </div>

      <div class="field" style="margin-top:1.5rem">
        <button class="btn-generate" id="btnGenerate" onclick="generate()">
          <span class="btn-text">⚡ Generate Sekarang</span>
          <span class="spinner"></span>
        </button>
      </div>

      <div class="error-box" id="errorBox"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-label">// hasil generate</div>
      <div class="result-img-wrap">
        <img id="resultImg" src="" alt="IQC Result" />
      </div>
      <div class="result-actions">
        <button class="btn-action btn-download" onclick="downloadImg()">↓ Download</button>
        <button class="btn-action btn-copy" onclick="copyImg()">⎘ Salin Gambar</button>
      </div>
    </div>
  </div>

  <script>
    function updateJam() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('jam').value = h + ':' + m;
    }
    updateJam();
    setInterval(updateJam, 1000);

    const COOLDOWN_S = 60;
    let cooldownInterval = null;
    let lastImageUrl = null;

    function startCooldownUI() {
      const wrap = document.getElementById('cooldownWrap');
      const bar = document.getElementById('cooldownBar');
      const text = document.getElementById('cooldownText');
      const btn = document.getElementById('btnGenerate');

      wrap.classList.add('show');
      btn.disabled = true;
      let remaining = COOLDOWN_S;
      bar.style.width = '100%';
      text.textContent = 'Cooldown: ' + remaining + ' detik';

      cooldownInterval = setInterval(function() {
        remaining--;
        var pct = (remaining / COOLDOWN_S) * 100;
        bar.style.width = pct + '%';
        text.textContent = 'Cooldown: ' + remaining + ' detik';
        if (remaining <= 0) {
          clearInterval(cooldownInterval);
          wrap.classList.remove('show');
          btn.disabled = false;
        }
      }, 1000);
    }

    async function generate() {
      var prompt = document.getElementById('prompt').value.trim();
      var jam = document.getElementById('jam').value;
      var batre = document.getElementById('batre').value;
      var errorBox = document.getElementById('errorBox');
      var btn = document.getElementById('btnGenerate');
      var resultCard = document.getElementById('resultCard');

      errorBox.classList.remove('show');
      errorBox.textContent = '';

      if (!prompt) {
        errorBox.textContent = '⚠ Prompt tidak boleh kosong!';
        errorBox.classList.add('show');
        return;
      }
      if (!batre || batre < 0 || batre > 100) {
        errorBox.textContent = '⚠ Masukkan persentase baterai yang valid (0–100)!';
        errorBox.classList.add('show');
        return;
      }

      try {
        var cdRes = await fetch('/api/cooldown', { method: 'POST' });
        var cdData = await cdRes.json();
        if (!cdData.ready) {
          errorBox.textContent = '⏳ Cooldown aktif! Tunggu ' + cdData.remainingSeconds + ' detik lagi.';
          errorBox.classList.add('show');
          return;
        }
      } catch (e) {}

      btn.disabled = true;
      btn.classList.add('loading');
      resultCard.classList.remove('show');

      var apiUrl = 'https://api-faa.my.id/faa/iqcv2?prompt=' + encodeURIComponent(prompt) + '&jam=' + encodeURIComponent(jam) + '&batre=' + encodeURIComponent(batre);
      var img = document.getElementById('resultImg');

      img.onload = function() {
        lastImageUrl = apiUrl;
        resultCard.classList.add('show');
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        btn.classList.remove('loading');
        startCooldownUI();
      };

      img.onerror = function() {
        errorBox.textContent = '❌ Gagal memuat gambar dari API. Coba lagi.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.classList.remove('loading');
      };

      img.src = apiUrl + '&t=' + Date.now();
    }

    function downloadImg() {
      if (!lastImageUrl) return;
      var url = new URL(lastImageUrl);
      var prompt = url.searchParams.get('prompt');
      var jam = url.searchParams.get('jam');
      var batre = url.searchParams.get('batre');
      var downloadUrl = '/api/download?prompt=' + encodeURIComponent(prompt) + '&jam=' + encodeURIComponent(jam) + '&batre=' + encodeURIComponent(batre);
      var a = document.createElement('a');
      a.href = downloadUrl;
      a.download = 'iqc-' + Date.now() + '.png';
      a.click();
    }

    async function copyImg() {
      if (!lastImageUrl) return;
      try {
        var res = await fetch(lastImageUrl);
        var blob = await res.blob();
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        var btn = document.querySelector('.btn-copy');
        var orig = btn.textContent;
        btn.textContent = '✓ Tersalin!';
        setTimeout(function() { btn.textContent = orig; }, 2000);
      } catch (e) {
        alert('Gunakan tombol Download untuk menyimpan gambar.');
      }
    }

    document.getElementById('prompt').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
    });
  </script>
</body>
  </html>
